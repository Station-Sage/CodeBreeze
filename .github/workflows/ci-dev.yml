name: CI - Dev (Full)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Format check (Prettier)
        run: npx prettier --check "src/**/*.ts" "browser-extension/**/*.js"
        continue-on-error: true

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run unit tests with coverage
        run: xvfb-run -a npx c8 npm test
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
        continue-on-error: true

      - name: Package VSIX
        run: npx vsce package

      - name: Check VSIX size
        run: |
          SIZE=$(stat -c%s codebreeze-*.vsix)
          SIZE_KB=$((SIZE / 1024))
          echo "📦 VSIX size: ${SIZE_KB} KB"
          if [ $SIZE -gt 10485760 ]; then
            echo "⚠️ VSIX exceeds 10MB"
            exit 1
          fi

      - name: Build browser extension
        run: npm run build:browser-ext
        continue-on-error: true

      - name: Upload VSIX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codebreeze-vsix
          path: '*.vsix'
          retention-days: 30

      - name: Upload browser extension artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codebreeze-browser-ext
          path: |
            dist/codebreeze-bridge.zip
            dist/codebreeze-bridge.crx
          retention-days: 30

      - name: PR impact analysis
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let changed;
            try {
              execSync('git fetch origin dev --depth=1');
              changed = execSync('git diff --name-only origin/dev...HEAD').toString().trim();
            } catch (e) {
              try {
                changed = execSync('git diff --name-only HEAD~1...HEAD').toString().trim();
              } catch (e2) {
                changed = execSync('git diff-tree --no-commit-id --name-only -r HEAD').toString().trim();
              }
            }
            const modules = {
              'src/apply/':          '📥 Apply 흐름',
              'src/collect/':        '📤 Collect 흐름',
              'src/bridge/':         '🌉 WebSocket 브릿지',
              'src/mcp/':            '🔌 MCP 서버',
              'src/ui/':             '🖥️ UI',
              'src/monitor/':        '👁️ 모니터',
              'src/utils/':          '🔧 유틸리티',
              'browser-extension/':  '🌐 브라우저 익스텐션',
              '.github/workflows/':  '⚙️ CI/CD',
              'package.json':        '📦 의존성',
            };
            const affected = Object.entries(modules)
              .filter(([path]) => changed.includes(path))
              .map(([, label]) => label)
              .join(', ') || '없음';
            const fileList = changed.split('\n').map(f => `- ${f}`).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 영향도 분석\n**영향 모듈**: ${affected}\n\n<details><summary>변경 파일 목록</summary>\n\n${fileList}\n</details>`
            });

      - name: Comment PR with artifacts
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI passed! VSIX and browser extension artifacts are available in the Actions tab.'
            })
