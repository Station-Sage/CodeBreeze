name: CI - Dev (Full)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run unit tests
        run: xvfb-run -a npm test
        continue-on-error: true

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Package VSIX
        run: npx vsce package

      - name: Build browser extension (CRX + ZIP)
        run: npm run build:browser-ext

      - name: Upload VSIX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codebreeze-vsix
          path: '*.vsix'
          retention-days: 30

      - name: Upload browser extension artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codebreeze-browser-ext
          path: |
            dist/codebreeze-bridge.zip
            dist/codebreeze-bridge.crx
          retention-days: 30

      - name: Comment PR with artifact
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI passed! VSIX and browser extension (CRX/ZIP) artifacts are available in the Actions tab.'
            })
