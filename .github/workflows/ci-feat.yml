name: CI - Feature Branches (Lightweight)

on:
  push:
    branches:
      - 'feat/**'

jobs:
  quick-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Format check (Prettier)
        run: npx prettier --check "src/**/*.ts" "browser-extension/**/*.js"
        continue-on-error: true

      - name: Basic lint
        run: npm run lint
        continue-on-error: true

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check status
        run: |
          echo "✅ Feature branch quick check passed!"
          echo "📝 Full CI will run when PR is created to dev"
